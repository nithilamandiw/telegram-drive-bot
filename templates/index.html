<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Drive Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #f7f7fb; color: #1f2937; }
    h1 { margin: 0 0 16px; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
    form.inline { display: inline; }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    th, td { border-bottom: 1px solid #e5e7eb; padding: 10px; text-align: left; }
    th { background: #f3f4f6; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    button, .btn { border: 1px solid #d1d5db; background: #fff; border-radius: 8px; padding: 6px 10px; cursor: pointer; text-decoration: none; color: #111827; }
    .btn.open { background: #eff6ff; border-color: #bfdbfe; }
    .btn.delete { background: #fef2f2; border-color: #fecaca; }
  </style>
</head>
<body>
  <h1>Telegram Drive Bot Dashboard</h1>

  <div class="card">
    <strong>Folder ID:</strong> {{ folder_id }}
    <form action="/upload" method="post" enctype="multipart/form-data" style="margin-top:12px; display:flex; gap:8px; align-items:center;">
      <input type="file" name="file" required />
      <button type="submit">Upload</button>
    </form>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Size</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for f in files %}
        <tr>
          <td>{{ f.name }}</td>
          <td>{{ f.size_human }}</td>
          <td class="actions">
            <a class="btn open" href="{{ f.webViewLink }}" target="_blank" rel="noopener">Open</a>

            <form class="inline" action="/delete/{{ f.id }}" method="post">
              <input type="hidden" name="mode" value="trash" />
              <button class="btn delete" type="submit">Move to Trash</button>
            </form>

            <form class="inline" action="/delete/{{ f.id }}" method="post">
              <input type="hidden" name="mode" value="delete" />
              <button class="btn delete" type="submit">Delete Permanently</button>
            </form>
          </td>
        </tr>
        {% else %}
        <tr>
          <td colspan="3">No files found.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</body>
</html>
